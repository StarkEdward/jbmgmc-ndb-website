y social factors related to health, disease and disability in the context of urban and rural societies.\",\"Appreciate the impact of urbanization on health and disease.\",\"Observe and interpret the dynamic of community behaviors.\",\"Describe the elements of normal psychology and social psychology.\",\"Observe the principles of practice of medicine in hospital and community settings.\",\"Describe the health care delivery systems including rehabilitation of the disabled in the country.\",\"Describe the National Health Programs with particular emphasis on maternal and child health programmers, family welfare planning and population control.\",\"List the epidemiological methods and techniques.\",\"Outline the demographic pattern of the country and appreciate the roles of the individuals, family, community and socio-cultural milieu in health and disease.\",\"Describe the health information systems.\",\"Enumerate the principles and components of primary health care and the national health policies to achieve the goal of “Health for all”.\",\"Identify the environmental and occupational hazards and their control.\",\"Describe the importance of water and sanitation in human health.\",\"To understand the principles of health economies, health administration, health education in relation to community.\"],\"skills\":[\"The principles and practice of medicine in hospital and community settings and familiarization with elementary practices.\",\"Use the Art of communication with patients including history taking and medico social work.\",\"Use epidemiology as a scientific tool to make rational decisions relevant to community and individual patient intervention.\",\"Collect, analyze, interpret and present simple community and hospital base data.\",\"Diagnose and manage common health problems and emergencies at the individual, family and community levels keeping in mind the existing health care resources and in the context of the prevailing socio-culture beliefs.\",\"Diagnose and
